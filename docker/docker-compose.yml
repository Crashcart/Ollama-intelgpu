# =============================================================================
# OLLAMA — Intel GPU Docker Stack
# =============================================================================
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  CATEGORY: AI CORE                                                      │
# │    ollama       — Ollama LLM engine with Intel GPU passthrough           │
# │                  data: ${DATA_DIR}/models   (can grow to 100+ GB)       │
# ├─────────────────────────────────────────────────────────────────────────┤
# │  CATEGORY: INTERFACE                                                    │
# │    portal          — Unified entry point: Chat+Models+Logs in one page  │
# │                      (port 45200)  stateless — no data directory needed │
# │    open-webui      — Browser chat UI connected to ollama  (port 45213)   │
# │                      data: ${DATA_DIR}/webui  (chat history, docs, RAG) │
# │    model-manager   — Model search, download, delete UI   (port 45214)   │
# │                      stateless — no data directory needed               │
# ├─────────────────────────────────────────────────────────────────────────┤
# │  CATEGORY: SEARCH                                                       │
# │    searxng     — Self-hosted search (internal only, no host port)       │
# │                  config: ${DATA_DIR}/searxng                            │
# ├─────────────────────────────────────────────────────────────────────────┤
# │  CATEGORY: PIPELINES                                                    │
# │    pipelines   — Open WebUI tool/function runtime (internal only)       │
# │                  data: ${DATA_DIR}/pipelines  (drop .py files to add)   │
# │                  Enables: tools, code exec, custom functions, filters,  │
# │                            rate limiting, usage monitoring               │
# ├─────────────────────────────────────────────────────────────────────────┤
# │  EXPORTABLE DATA  →  everything under DATA_DIR                         │
# │  LOGS (normal)    →  INFO level — clean, low-noise                     │
# │  LOGS (errors)    →  bash scripts/logs.sh errors    (classified by     │
# │                       severity: CRITICAL / SELF-RESOLVING / UNKNOWN)   │
# │  LOGS (diagnose)  →  bash scripts/logs.sh diagnose  (quick summary)    │
# │  LOGS (debug)     →  bash scripts/logs.sh debug-on  (deep detail)      │
# │                       bash scripts/logs.sh debug-off (back to normal)  │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Copy .env.example → docker/.env and set DATA_DIR to your storage path.
# Run `mkdir -p` for all subdirs before first start (docker compose creates
# them but as root — better to create them yourself first).
#
# =============================================================================

# ── Shared DNS ────────────────────────────────────────────────────────────────
# Docker bridge containers inherit the host's /etc/resolv.conf, but many Linux
# distros (systemd-resolved, split-DNS, VPNs) configure a stub resolver at
# 127.0.0.53 that is not reachable from inside a container.  The result is
# DNS failures like "[Errno -3] Temporary failure in name resolution" when
# containers try to reach huggingface.co, docker.io, pypi.org, etc.
# Setting explicit public DNS on each service that needs outbound internet
# access bypasses the stub and ensures reliable name resolution.
#
# Override DNS_PRIMARY / DNS_SECONDARY in docker/.env for:
#   - Split-horizon / filtering DNS (corporate networks, Pi-hole)
#   - VPN-based name resolution (custom DNS servers over VPN)
#   - Preferred providers (e.g. 9.9.9.9 Quad9, 208.67.222.222 OpenDNS)
x-internet-dns: &internet-dns
  dns:
    - ${DNS_PRIMARY:-1.1.1.1}    # Override with DNS_PRIMARY in docker/.env
    - ${DNS_SECONDARY:-8.8.8.8}  # Override with DNS_SECONDARY in docker/.env

services:

# =============================================================================
#  CATEGORY: AI CORE
#  Purpose : LLM inference engine; all model weights live on the host
#  Port    : 11434 (raw Ollama API — also consumed by open-webui internally)
#  Data    : ${DATA_DIR}/models — store on large/fast drive; copy or rsync
#            to export. Models are plain files and can be moved freely.
# =============================================================================

  ollama:
    <<: *internet-dns
    build:
      context: .
      dockerfile: Dockerfile
      network: host          # Use host DNS so Intel GPU repo resolves during build
      args:
        OLLAMA_VERSION: ${OLLAMA_VERSION:-latest}
    image: ollama:${OLLAMA_VERSION:-latest}
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-ollama
    restart: unless-stopped

    labels:
      com.ollama.category: "ai-core"
      com.ollama.description: "Ollama LLM inference engine — Intel GPU"
      com.ollama.data: "${DATA_DIR:-/opt/ollama}/models"
      com.ollama.log: "${DATA_DIR:-/opt/ollama}/logs/ollama.log"

    # Intel GPU device passthrough (Arc / Iris Xe / integrated Intel graphics)
    devices:
      - /dev/dri:/dev/dri
    # Numeric GIDs — bypasses Docker's name-lookup against the container's
    # /etc/group, which fails when the 'render' group was never added to the
    # Ubuntu 22.04 base image.  install.sh detects both GIDs from the host and
    # writes them to docker/.env; defaults cover the typical Ubuntu values.
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-993}"

    environment:
      - OLLAMA_HOST=0.0.0.0:11434

      # ── Concurrency / queue ──────────────────────────────────────────────
      # NUM_PARALLEL=1 keeps one request running at a time on the GPU so VRAM
      # is never split across simultaneous inference passes.  All other requests
      # from any app (Open WebUI, Cursor, scripts, etc.) wait in the queue.
      # Raise to 2-4 only if your GPU has spare VRAM and you want interleaving.
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}

      # How many requests can wait before Ollama starts returning 503.
      # 100 is plenty for personal/team use; raise if you have many clients.
      - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE:-100}

      # Keep only one model loaded in VRAM at a time (default on GPU anyway).
      # Set to 2+ only if you have headroom and switch models frequently.
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}

      # Unload the model after this idle period to free VRAM.
      # -1 keeps the model loaded forever — best latency (recommended).
      # 5m is the Ollama default; it causes 10-45 s cold-start after each idle gap.
      # 0  unloads immediately after each request (max VRAM savings, worst latency).
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}

      # ── Request speed — Flash Attention & KV-cache quantization ────────────
      # Flash Attention: 2-3× faster attention computation. Falls back silently
      # if the model or runtime doesn't support it — safe to leave enabled.
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}

      # KV-cache quantization: reduces VRAM used by the attention cache, allowing
      # larger contexts and faster inference. q8_0 = half the VRAM of f16 with
      # negligible accuracy loss. q4_0 = ~75% savings with slight accuracy drop.
      - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE:-q8_0}

      # Allowed origins for the Ollama API (CORS + host-header check).
      # '*' permits any origin — works across all subnets, VPNs, and VLANs
      # without configuration.  Override in docker/.env to tighten if needed,
      # e.g. OLLAMA_ORIGINS=http://192.168.1.,http://10.
      - OLLAMA_ORIGINS=${OLLAMA_ORIGINS:-*}

      # Debug: set OLLAMA_DEBUG=1 in docker/.env (or run: bash scripts/logs.sh debug-on)
      # Enables verbose GPU selection, model load steps, and token generation traces.
      - OLLAMA_DEBUG=${OLLAMA_DEBUG:-0}

    ports:
      - "${OLLAMA_PORT:-11434}:11434"

    volumes:
      # ── Models (large, exportable) ────────────────────────────────────────
      # Bind-mounted to host so models survive image rebuilds and can be
      # copied/moved to another machine without re-downloading.
      - ${DATA_DIR:-/opt/ollama}/models:/root/.ollama

    # Checks the Ollama HTTP API — visible as healthy/unhealthy in Portainer,
    # Dockge, Yacht, and any other Docker manager that reads healthcheck state.
    # start_period gives the engine time to initialise before failures count.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 60s

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-5}"
        tag: "ollama"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: INTERFACE
#  Purpose : Browser-based chat UI; manages conversations, RAG documents,
#            and user settings. Web search is OFF by default — enable per
#            message via the magnifying glass toggle in the chat bar.
#  Port    : 45213 → http://localhost:45213
#  Data    : ${DATA_DIR}/webui — contains SQLite DB (chat history, users),
#            ChromaDB vector store (RAG embeddings), uploaded documents.
#            Back up or rsync this directory to export everything.
# =============================================================================

  open-webui:
    <<: *internet-dns
    image: ghcr.io/open-webui/open-webui:main
    pull_policy: if_not_present   # reuse existing container from a previous install
    platform: linux/amd64
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-open-webui
    restart: unless-stopped
    # Wait for all backends to pass their health checks before starting.
    # This prevents the UI from coming up before its dependencies are ready.
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_healthy
      pipelines:
        condition: service_healthy

    labels:
      com.ollama.category: "interface"
      com.ollama.description: "Open WebUI chat interface"
      com.ollama.data: "${DATA_DIR:-/opt/ollama}/webui"
      com.ollama.log: "${DATA_DIR:-/opt/ollama}/logs/webui.log"

    ports:
      - "${WEBUI_PORT:-45213}:8080"

    environment:
      # ── LLM engine ───────────────────────────────────────────────────────
      - OLLAMA_BASE_URL=http://ollama:11434

      # ── Default model ───────────────────────────────────────────────────
      # Pre-select a model for new chats. Leave empty to let users pick.
      # Must match a model already pulled in Ollama (e.g. mistral, llama3.2:3b).
      - DEFAULT_MODELS=${DEFAULT_MODELS:-}

      # ── Pipelines — tools, functions, code execution, custom filters ─────
      # Connects to the pipelines container as an OpenAI-compatible endpoint.
      # Drop any .py pipeline file into ${DATA_DIR}/pipelines to add new tools.
      # Manage active pipelines in Open WebUI: Admin → Settings → Pipelines.
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URLS=http://pipelines:9099
      - OPENAI_API_KEYS=${PIPELINES_API_KEY}

      # ── RAG — document Q&A (PDF, DOCX, TXT, URLs) ────────────────────────
      # Upload documents in any chat via the paperclip icon. Open WebUI chunks
      # them, embeds them locally, and retrieves relevant context automatically.
      # Enable URL/web-page ingestion so users can paste links as context.
      - ENABLE_RAG_LOCAL_WEB_FETCH=true
      # Extract images from PDFs so vision-capable models can read charts/diagrams.
      - PDF_EXTRACT_IMAGES=true
      # Chunk sizes — increase CHUNK_SIZE for long-form docs, lower for precision.
      - CHUNK_SIZE=${CHUNK_SIZE:-1500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-100}

      # ── Web search — SearXNG backend ──────────────────────────────────────
      # Off by default — user toggles per message via the search icon.
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json

      # ── YouTube transcript loading ─────────────────────────────────────
      # Paste a YouTube URL into a chat to load its transcript as RAG context.
      # The model can then answer questions about the video content.
      - YOUTUBE_LOADER_LANGUAGE=${YOUTUBE_LOADER_LANGUAGE:-en}

      # ── Audio — Speech-to-Text (microphone → text) ────────────────────────
      # Uses faster-whisper running inside the Open WebUI container — no extra
      # service needed.  Click the microphone icon in the chat bar to speak.
      # Models: tiny (fastest) | base | small | medium | large (most accurate)
      - AUDIO_STT_ENGINE=${AUDIO_STT_ENGINE:-whisper}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}

      # ── Audio — Text-to-Speech (text → voice) ─────────────────────────────
      # Empty = browser-native TTS (no setup, lower quality).
      # Set to "openai" to use the Kokoro TTS pipeline (add the pipeline first).
      - AUDIO_TTS_ENGINE=${AUDIO_TTS_ENGINE:-}

      # ── Image generation ──────────────────────────────────────────────────
      # Disabled by default. To enable, add an AUTOMATIC1111 or ComfyUI service
      # to this compose file, then set ENABLE_IMAGE_GENERATION=true in docker/.env.
      # Generates images from the chat bar (camera icon appears when enabled).
      - ENABLE_IMAGE_GENERATION=${ENABLE_IMAGE_GENERATION:-false}
      - IMAGE_GENERATION_ENGINE=${IMAGE_GENERATION_ENGINE:-automatic1111}
      - AUTOMATIC1111_BASE_URL=${AUTOMATIC1111_BASE_URL:-http://automatic1111:7860}

      # ── Logging ───────────────────────────────────────────────────────────
      # INFO by default; set WEBUI_LOG_LEVEL=DEBUG in docker/.env for detailed
      # traces of every request, RAG retrieval, embedding, and search call.
      # Or run: bash scripts/logs.sh debug-on
      - LOG_LEVEL=${WEBUI_LOG_LEVEL:-INFO}

      # ── Open WebUI stays on the image it was first installed with ─────────
      # To get a newer Open WebUI release run:  bash scripts/update.sh
      # That will pull the latest image and recreate the container safely.

      # ── Community sharing ──────────────────────────────────────────────
      # Allow users to share their custom prompts to the Open WebUI community hub.
      - ENABLE_COMMUNITY_SHARING=${ENABLE_COMMUNITY_SHARING:-false}

      # ── Auth / user management ──────────────────────────────────────────
      # WEBUI_AUTH=true enables login-protected multi-user accounts.
      # ENABLE_SIGNUP controls whether new users can register themselves.
      # WEBUI_SECRET_KEY is the JWT signing secret — auto-generated if empty,
      # but set it explicitly so sessions survive container restarts.
      - WEBUI_AUTH=${WEBUI_AUTH:-false}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-}

    volumes:
      # ── Chat history, RAG docs, embeddings, settings (exportable) ─────────
      - ${DATA_DIR:-/opt/ollama}/webui:/app/backend/data

    # /health responds as soon as the FastAPI server starts — before the slower
    # first-run tasks (embedding model download, DB migrations) complete.
    # start_period: set WEBUI_START_PERIOD in docker/.env to extend on slow hardware.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || wget -qO/dev/null http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: ${WEBUI_START_PERIOD:-300s}

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-5}"
        tag: "open-webui"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: SEARCH
#  Purpose : Self-hosted search engine. Aggregates public search results and
#            returns them to Open WebUI when the user toggles web search on.
#            Never exposes a host port — reachable only inside ollama_net.
#  Data    : ${DATA_DIR}/searxng — config only (settings.yml). Small but
#            important to back up if you customise search engines or add
#            custom categories.
# =============================================================================

  searxng:
    <<: *internet-dns
    image: searxng/searxng:latest
    pull_policy: if_not_present   # reuse existing container from a previous install
    platform: linux/amd64
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-searxng
    restart: unless-stopped

    labels:
      com.ollama.category: "search"
      com.ollama.description: "SearXNG self-hosted search backend (internal only)"
      com.ollama.data: "${DATA_DIR:-/opt/ollama}/searxng"
      com.ollama.log: "${DATA_DIR:-/opt/ollama}/logs/searxng.log"

    # No host port — SearXNG is private to the Docker network
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
      # Debug: set SEARXNG_DEBUG=true in docker/.env (or run: bash scripts/logs.sh debug-on)
      # Enables per-engine request/response traces and result ranking details.
      - SEARXNG_DEBUG=${SEARXNG_DEBUG:-false}

    volumes:
      # ── Search config ─────────────────────────────────────────────────────
      # The data dir holds SearXNG's writable runtime state (limiter.toml,
      # favicon cache, etc.).  The settings.yml is bind-mounted directly from
      # the repo so it is always present — even on a completely fresh DATA_DIR —
      # and SearXNG will never fail to start with a missing config error.
      # To customise search engines, edit docker/searxng/settings.yml.
      - ${DATA_DIR:-/opt/ollama}/searxng:/etc/searxng
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro

    # SearXNG runs on Alpine (busybox wget, no curl by default).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://localhost:8080/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-5}"
        tag: "searxng"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: PIPELINES
#  Purpose : Python function/tool runtime for Open WebUI.  Appears in the UI
#            as an additional model provider — pipelines show up alongside
#            Ollama models and can intercept, transform, or augment requests.
#  Enables : custom tools, code execution, web scraping, rate limiting,
#            usage monitoring, filter pipelines, function calling, and more.
#  Add     : drop any .py pipeline file into ${DATA_DIR}/pipelines/
#            then reload in Open WebUI: Admin → Settings → Pipelines
#  Port    : internal only (9099) — Open WebUI connects via OPENAI_API_BASE_URLS
#  Data    : ${DATA_DIR}/pipelines — pipeline scripts, small but critical
# =============================================================================

  pipelines:
    <<: *internet-dns
    image: ghcr.io/open-webui/pipelines:main
    pull_policy: if_not_present   # reuse existing container from a previous install
    platform: linux/amd64
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-pipelines
    restart: unless-stopped

    labels:
      com.ollama.category: "pipelines"
      com.ollama.description: "Open WebUI function and tool runtime"
      com.ollama.data: "${DATA_DIR:-/opt/ollama}/pipelines"
      com.ollama.log: "${DATA_DIR:-/opt/ollama}/logs/pipelines.log"

    environment:
      # Key must match OPENAI_API_KEYS in open-webui — set both in docker/.env
      - PIPELINES_API_KEY=${PIPELINES_API_KEY}

    volumes:
      # ── Pipeline scripts (exportable) ─────────────────────────────────────
      # Drop any .py pipeline file here to make it available in Open WebUI.
      # Built-in examples: https://github.com/open-webui/pipelines/tree/main/examples
      - ${DATA_DIR:-/opt/ollama}/pipelines:/app/pipelines

    # No host port — pipelines is private to the Docker network.
    # Open WebUI connects to it via http://pipelines:9099 (OPENAI_API_BASE_URLS).

    # start_period: set PIPELINES_START_PERIOD in docker/.env to extend on slow hardware.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9099/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: ${PIPELINES_START_PERIOD:-60s}

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-5}"
        tag: "pipelines"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: INTERFACE — MODEL MANAGER
#  Purpose : Lightweight web UI for searching and downloading Ollama models.
#            Browse a curated catalog, filter by category (text/code/vision/
#            embedding), pull any model by name, track download progress, and
#            delete models to reclaim disk space.
#            Pulls any model from the Ollama registry — no CLI needed.
#  Port    : 45214 → http://localhost:45214
#  Data    : none (stateless proxy to the ollama container)
# =============================================================================

  model-manager:
    <<: *internet-dns
    build:
      context: ./model-manager
      dockerfile: Dockerfile
    image: ollama-model-manager:latest
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-model-manager
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      uds-proxy:
        condition: service_healthy

    labels:
      com.ollama.category: "interface"
      com.ollama.description: "Ollama model search and download manager"
      com.ollama.data: "none"
      com.ollama.log: "${DATA_DIR:-/opt/ollama}/logs/model-manager.log"

    ports:
      - "${MODEL_MANAGER_PORT:-45214}:8080"

    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_SOCKET=/sockets/ollama.sock
      # Port only — the browser constructs the full URL using its own hostname,
      # so the "Open WebUI" link works whether you access via localhost, LAN IP,
      # or a hostname like boris.local.
      - WEBUI_PORT=${WEBUI_PORT:-45213}

    volumes:
      - ollama_sockets:/sockets

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; socket.create_connection(('localhost', 8080), 2).close()\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-5}"
        tag: "model-manager"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: AI CORE — UDS PROXY
#  Purpose : Exposes Ollama's HTTP API over a Unix Domain Socket so that
#            internal services (ghost-runner, model-manager) can connect
#            without TCP stack overhead.  The socket file lives in the
#            shared 'ollama_sockets' named volume mounted by each consumer.
#  Port    : none — communication is via /sockets/ollama.sock only
# =============================================================================

  uds-proxy:
    build:
      context: ./uds-proxy
      dockerfile: Dockerfile
    image: ollama-uds-proxy:latest
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-uds-proxy
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy

    labels:
      com.ollama.category: "ai-core"
      com.ollama.description: "Unix Domain Socket proxy — Ollama API via /sockets/ollama.sock"
      com.ollama.data: "none"
      com.ollama.log: "none"

    environment:
      - SOCKET_PATH=/sockets/ollama.sock
      - UPSTREAM_HOST=ollama
      - UPSTREAM_PORT=11434

    volumes:
      - ollama_sockets:/sockets

    # Healthy when the socket file exists and is a socket
    healthcheck:
      test: ["CMD-SHELL", "test -S /sockets/ollama.sock"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "2"
        tag: "uds-proxy"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: INTERFACE — MEMORY BROWSER
#  Purpose : Persistent AI memory store.  Facts ("memories") the AI has
#            learned are saved here.  Pinned memories can be fetched by
#            other services via GET /api/memories/pinned and injected into
#            every new conversation's system prompt.
#  Port    : 45216 → http://localhost:45216
#  Data    : ${DATA_DIR}/memory — SQLite DB (memories table)
# =============================================================================

  memory-browser:
    build:
      context: ./memory-browser
      dockerfile: Dockerfile
    image: ollama-memory-browser:latest
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-memory-browser
    restart: unless-stopped

    labels:
      com.ollama.category: "interface"
      com.ollama.description: "AI memory store — persistent facts with pin and CRUD UI"
      com.ollama.data: "${DATA_DIR:-/opt/ollama}/memory"
      com.ollama.log: "${DATA_DIR:-/opt/ollama}/logs/memory-browser.log"

    ports:
      - "${MEMORY_PORT:-45216}:8080"

    environment:
      - DB_PATH=/data/memory.db

    volumes:
      - ${DATA_DIR:-/opt/ollama}/memory:/data

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; socket.create_connection(('localhost', 8080), 2).close()\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-5}"
        tag: "memory-browser"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: INTERFACE — FILE CATALOG
#  Purpose : Large-file browser for DATA_DIR.  Lists model weights, DBs, and
#            other large files; lets you move them to a mounted external drive
#            and automatically creates symlinks back so all paths keep working.
#  Port    : 45217 → http://localhost:45217
#  Mounts  : DATA_DIR → /data (read-write for move/restore)
#             DRIVES_DIR (default /mnt) → /drives (external drive mount points)
# =============================================================================

  file-catalog:
    build:
      context: ./file-catalog
      dockerfile: Dockerfile
    image: ollama-file-catalog:latest
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-file-catalog
    restart: unless-stopped

    labels:
      com.ollama.category: "interface"
      com.ollama.description: "Large-file catalog — browse, move to external drive, symlink back"
      com.ollama.log: "${DATA_DIR:-/opt/ollama}/logs/file-catalog.log"

    ports:
      - "${FILE_CATALOG_PORT:-45217}:8080"

    environment:
      - DATA_DIR=/data
      - DRIVES_DIR=/drives
      - MIN_SIZE_MB=${FILE_CATALOG_MIN_MB:-100}

    volumes:
      - ${DATA_DIR:-/opt/ollama}:/data
      - ${DRIVES_DIR:-/mnt}:/drives

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; socket.create_connection(('localhost', 8080), 2).close()\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-5}"
        tag: "file-catalog"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: INTERFACE — GHOST RUNNER
#  Purpose : Background task generation with resume support.
#            Submit a prompt; the server streams Ollama's response and saves
#            every token to SQLite. Close your browser — the generation
#            continues. Reconnect and stream from any sequence position to
#            replay the full output.
#  Port    : 45215 → http://localhost:45215
#  Data    : ${DATA_DIR}/ghost — SQLite DB (tasks + tokens)
# =============================================================================

  ghost-runner:
    build:
      context: ./ghost-runner
      dockerfile: Dockerfile
    image: ollama-ghost-runner:latest
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-ghost-runner
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      uds-proxy:
        condition: service_healthy

    labels:
      com.ollama.category: "interface"
      com.ollama.description: "Ghost Runner — background AI task generation with resume"
      com.ollama.data: "${DATA_DIR:-/opt/ollama}/ghost"
      com.ollama.log: "${DATA_DIR:-/opt/ollama}/logs/ghost-runner.log"

    ports:
      - "${GHOST_RUNNER_PORT:-45215}:8080"

    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_SOCKET=/sockets/ollama.sock
      - DB_PATH=/data/ghost.db

    volumes:
      - ${DATA_DIR:-/opt/ollama}/ghost:/data
      - ollama_sockets:/sockets

    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; socket.create_connection(('localhost', 8080), 2).close()\""]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-5}"
        tag: "ghost-runner"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: INTERFACE — PORTAL
#  Purpose : Single unified entry point for all web interfaces.
#            One address, one page — Chat / Models / Logs are accessible via
#            a top navbar without leaving the browser tab.  Switching panels
#            keeps state (open chat, scroll position) by hiding/showing the
#            iframes rather than reloading them.
#  Port    : 45200 → http://localhost:45200  (the recommended bookmark)
#  Data    : none (static HTML shell, ports injected at startup via envsubst)
# =============================================================================

  portal:
    <<: *internet-dns
    build:
      context: ./portal
      dockerfile: Dockerfile
    image: ollama-portal:latest
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-portal
    restart: unless-stopped
    # Portal is purely a static page — it can start before the services it
    # frames; the iframes show a spinner until each service responds.
    depends_on:
      - open-webui
      - model-manager
      - ghost-runner
      - memory-browser
      - dozzle

    labels:
      com.ollama.category: "interface"
      com.ollama.description: "Unified portal — single entry point for Chat, Models, and Logs"
      com.ollama.data: "none"
      com.ollama.log: "none"

    ports:
      - "${PORTAL_PORT:-45200}:8080"

    environment:
      # Port numbers are injected into the HTML at container start via envsubst.
      # The browser constructs the full URL using its own hostname — no host is
      # hardcoded, so boris.local, a LAN IP, and localhost all work the same way.
      - WEBUI_PORT=${WEBUI_PORT:-45213}
      - MODEL_MANAGER_PORT=${MODEL_MANAGER_PORT:-45214}
      - GHOST_RUNNER_PORT=${GHOST_RUNNER_PORT:-45215}
      - MEMORY_PORT=${MEMORY_PORT:-45216}
      - FILE_CATALOG_PORT=${FILE_CATALOG_PORT:-45217}
      - DOZZLE_PORT=${DOZZLE_PORT:-9999}
      - OLLAMA_PORT=${OLLAMA_PORT:-11434}

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "2m"
        max-file: "2"
        tag: "portal"

    networks:
      - ollama_net

# =============================================================================
#  CATEGORY: LOGS
#  Purpose : Real-time web log viewer for all stack containers.
#            Open http://localhost:9999 in your browser to see live logs,
#            search across containers, and filter by level — no CLI needed.
#            Read-only: Dozzle can only view logs, not modify containers.
#  Port    : 9999 → http://localhost:9999
# =============================================================================

  dozzle:
    image: amir20/dozzle:latest
    pull_policy: if_not_present   # reuse existing container from a previous install
    platform: linux/amd64
    container_name: ${PROJECT_PREFIX:-olama-intelgpu}-dozzle
    restart: unless-stopped
    # Dozzle streams live logs from the Docker socket; it needs extra time to
    # close those streams cleanly on shutdown.  Without this, Docker sends
    # SIGKILL after the default 10 s and Dozzle logs "context deadline exceeded
    # — failed to shut down".  30 s gives it enough time to drain gracefully.
    stop_grace_period: 30s

    labels:
      com.ollama.category: "logs"
      com.ollama.description: "Dozzle real-time web log viewer"
      com.ollama.data: "none"
      com.ollama.log: "none"

    # Read-only access to Docker socket — Dozzle only reads logs, never writes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      # Show only this stack's containers (all have the com.ollama.category label)
      - DOZZLE_FILTER=label=com.ollama.category
      # Name shown in the Dozzle browser tab
      - DOZZLE_HOSTNAME=${PROJECT_PREFIX:-olama-intelgpu}
      - DOZZLE_NO_ANALYTICS=true
      # Minimum log level shown in the Dozzle UI.
      # info  → shows all normal operational messages (default)
      # warn  → hides routine INFO noise; surfaces warnings and above
      # error → only errors and critical messages (very quiet)
      # Override in docker/.env: DOZZLE_LEVEL=warn
      - DOZZLE_LEVEL=${DOZZLE_LEVEL:-info}

    ports:
      - "${DOZZLE_PORT:-9999}:8080"

    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
        tag: "dozzle"

    networks:
      - ollama_net

# =============================================================================
#  NETWORK
# =============================================================================

networks:
  ollama_net:
    driver: bridge
    labels:
      com.ollama.description: "Internal network — ollama, open-webui, searxng, pipelines, dozzle"

# Shared volume for the Unix Domain Socket file.
# ollama_sockets is mounted by uds-proxy (creates the socket) and by
# ghost-runner and model-manager (connect to it).  The socket file is
# recreated on each uds-proxy start so persistence is not required.
volumes:
  ollama_sockets:
    driver: local
