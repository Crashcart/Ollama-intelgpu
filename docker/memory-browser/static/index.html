<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Browser</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --nav:        #111714;
      --nav-border: #1e2a1e;
      --surface:    #141a14;
      --surface2:   #111511;
      --border:     #243024;
      --text:       #dde8dd;
      --dim:        #5a6b5a;
      --accent:     #4ade80;
      --accent-bg:  rgba(74,222,128,.10);
      --accent-bdr: rgba(74,222,128,.28);
      --green:      #4ade80;
      --red:        #f87171;
      --yellow:     #fbbf24;
      --pin:        #fbbf24;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }

    body { display: flex; flex-direction: column; overflow: hidden; }

    /* ── Top bar ─────────────────────────────────────────────── */
    .topbar {
      height: 48px;
      min-height: 48px;
      background: var(--nav);
      border-bottom: 1px solid var(--nav-border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: .75rem;
      flex-shrink: 0;
    }
    .logo { font-weight: 700; font-size: .95rem; letter-spacing: -.3px; }
    .logo em { color: var(--accent); font-style: normal; }
    .spacer { flex: 1; }
    .count-badge {
      font-size: .73rem;
      color: var(--dim);
      white-space: nowrap;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .38rem .85rem;
      border-radius: 6px;
      border: 1px solid var(--accent-bdr);
      background: var(--accent-bg);
      color: var(--accent);
      font-size: .8rem; font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(74,222,128,.18); }
    .btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    .btn-ghost {
      border-color: var(--border); background: transparent; color: var(--dim);
    }
    .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,.05); }

    /* ── Search bar ──────────────────────────────────────────── */
    .search-bar {
      padding: .65rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: .5rem;
      flex-shrink: 0;
    }
    .search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .82rem;
      padding: .4rem .7rem;
      outline: none;
      transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--accent-bdr); }
    .search-input::placeholder { color: var(--dim); }

    .filter-btn {
      padding: .38rem .7rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      font-size: .76rem;
      cursor: pointer;
      transition: color .15s, background .15s, border-color .15s;
      white-space: nowrap;
    }
    .filter-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
    .filter-btn.active {
      color: var(--pin);
      border-color: rgba(251,191,36,.4);
      background: rgba(251,191,36,.08);
    }

    /* ── Main scroll area ────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Section headers ─────────────────────────────────────── */
    .section-hdr {
      font-size: .7rem;
      font-weight: 600;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .6rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .section-hdr .pin-icon { color: var(--pin); }
    .section-count {
      font-size: .66rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 .35rem;
      line-height: 1.6;
      color: var(--dim);
    }

    /* ── Memory grid ─────────────────────────────────────────── */
    .memory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: .65rem;
      margin-bottom: 1.4rem;
    }

    .memory-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      transition: border-color .15s;
      position: relative;
    }
    .memory-card:hover { border-color: #2d3d2d; }
    .memory-card.pinned { border-color: rgba(251,191,36,.3); }

    .card-content {
      font-size: .82rem;
      line-height: 1.55;
      color: var(--text);
      flex: 1;
      word-break: break-word;
      white-space: pre-wrap;
      cursor: text;
      min-height: 2.5rem;
    }
    .card-content:empty::before {
      content: 'Empty memory';
      color: var(--dim);
      font-style: italic;
    }

    .card-edit-area {
      display: none;
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--accent-bdr);
      border-radius: 5px;
      color: var(--text);
      font-size: .82rem;
      font-family: inherit;
      line-height: 1.55;
      padding: .4rem .5rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
    }
    .memory-card.editing .card-content  { display: none; }
    .memory-card.editing .card-edit-area { display: block; }

    .card-footer {
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .card-age {
      font-size: .68rem;
      color: var(--dim);
      flex: 1;
    }

    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: color .15s, background .15s;
      flex-shrink: 0;
      padding: 0;
    }
    .icon-btn svg { width: 13px; height: 13px; }
    .icon-btn:hover { color: var(--text); background: rgba(255,255,255,.07); }

    .pin-btn { }
    .pin-btn.pinned { color: var(--pin); }
    .pin-btn.pinned:hover { color: var(--pin); background: rgba(251,191,36,.1); }

    .edit-btn:hover  { color: var(--accent); background: var(--accent-bg); }
    .del-btn:hover   { color: var(--red); background: rgba(248,113,113,.08); }
    .save-btn { color: var(--accent); display: none; }
    .save-btn:hover  { background: var(--accent-bg); }
    .memory-card.editing .save-btn { display: flex; }
    .memory-card.editing .edit-btn { display: none; }

    /* ── Add new card ────────────────────────────────────────── */
    .add-card {
      background: var(--surface2);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: .75rem;
      display: none;
      flex-direction: column;
      gap: .5rem;
      margin-bottom: 1.4rem;
    }
    .add-card.open { display: flex; }

    .add-textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: .82rem;
      font-family: inherit;
      line-height: 1.55;
      padding: .5rem .65rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color .15s;
    }
    .add-textarea:focus { border-color: var(--accent-bdr); }
    .add-textarea::placeholder { color: var(--dim); }

    .add-footer { display: flex; gap: .4rem; justify-content: flex-end; }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--dim);
      font-size: .82rem;
      line-height: 1.8;
    }
    .empty-state svg {
      width: 32px; height: 32px; opacity: .2;
      display: block; margin: 0 auto .7rem;
    }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="logo">Memory <em>Browser</em></span>
  <span class="count-badge" id="count-badge">0 memories</span>
  <div class="spacer"></div>
  <button class="btn" onclick="toggleAddCard()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5"  y1="12" x2="19" y2="12"/>
    </svg>
    Add Memory
  </button>
</div>

<!-- Search + filter -->
<div class="search-bar">
  <input class="search-input" id="search" placeholder="Search memories…" oninput="renderAll()">
  <button class="filter-btn" id="pin-filter" onclick="togglePinFilter()">
    ★ Pinned only
  </button>
</div>

<!-- Scrollable content -->
<div class="content" id="content">

  <!-- Add memory card (collapsed by default) -->
  <div class="add-card" id="add-card">
    <textarea class="add-textarea" id="add-textarea"
              placeholder="Type a fact to remember…&#10;e.g. &quot;User prefers concise responses&quot;"
              onkeydown="addKeydown(event)"></textarea>
    <div class="add-footer">
      <button class="btn btn-ghost" onclick="closeAddCard()">Cancel</button>
      <button class="btn" onclick="submitAdd()">Save Memory</button>
    </div>
  </div>

  <!-- Pinned section -->
  <div id="pinned-section" style="display:none">
    <div class="section-hdr">
      <span class="pin-icon">★</span> Pinned
      <span class="section-count" id="pin-count">0</span>
    </div>
    <div class="memory-grid" id="pinned-grid"></div>
  </div>

  <!-- All section -->
  <div id="all-section">
    <div class="section-hdr" id="all-hdr">
      All Memories
      <span class="section-count" id="all-count">0</span>
    </div>
    <div class="memory-grid" id="all-grid"></div>
  </div>

  <div class="empty-state" id="empty-state" style="display:none">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M9 11l3 3L22 4"/>
      <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
    </svg>
    No memories yet.<br>Click <strong>Add Memory</strong> to save a fact.
  </div>

</div>

<script>
/* ─────────────────────────────────────────────────────────
   State
───────────────────────────────────────────────────────── */
let memories    = [];
let pinOnly     = false;

/* ─────────────────────────────────────────────────────────
   Init
───────────────────────────────────────────────────────── */
async function init() {
  await load();
  setInterval(load, 60000);
}

/* ─────────────────────────────────────────────────────────
   Data
───────────────────────────────────────────────────────── */
async function load() {
  try {
    const r = await fetch('/api/memories');
    const d = await r.json();
    memories = d.memories || [];
    renderAll();
  } catch (e) { console.warn('load failed', e); }
}

/* ─────────────────────────────────────────────────────────
   Render
───────────────────────────────────────────────────────── */
function renderAll() {
  const q    = document.getElementById('search').value.trim().toLowerCase();
  const list = q
    ? memories.filter(m => m.content.toLowerCase().includes(q))
    : memories;

  const shown   = pinOnly ? list.filter(m => m.pinned) : list;
  const pinned  = shown.filter(m =>  m.pinned);
  const unpinned = shown.filter(m => !m.pinned);

  // Count badge
  const total = memories.length;
  const pc    = memories.filter(m => m.pinned).length;
  document.getElementById('count-badge').textContent =
    total === 0 ? 'No memories' :
    pc > 0 ? `${total} memories · ${pc} pinned` : `${total} memor${total === 1 ? 'y' : 'ies'}`;

  // Pinned section
  const pinnedSec = document.getElementById('pinned-section');
  if (pinned.length && !pinOnly) {
    pinnedSec.style.display = '';
    document.getElementById('pin-count').textContent = pinned.length;
    document.getElementById('pinned-grid').innerHTML = pinned.map(cardHTML).join('');
  } else {
    pinnedSec.style.display = 'none';
  }

  // All section
  document.getElementById('all-hdr').firstChild.textContent =
    pinOnly ? '★ Pinned ' : 'All Memories ';
  document.getElementById('all-count').textContent = shown.length;
  document.getElementById('all-grid').innerHTML =
    (pinOnly ? pinned : unpinned).map(cardHTML).join('');

  // Empty state
  const isEmpty = shown.length === 0;
  document.getElementById('empty-state').style.display = isEmpty ? '' : 'none';
  document.getElementById('all-section').style.display = isEmpty ? 'none' : '';
}

function cardHTML(m) {
  const age = formatAge(m.updated_at);
  const pin = m.pinned ? 'pinned' : '';
  const starFill = m.pinned
    ? 'fill="var(--pin)" stroke="var(--pin)"'
    : 'fill="none" stroke="currentColor"';
  return `
    <div class="memory-card ${pin}" id="card-${m.id}">
      <div class="card-content" ondblclick="startEdit('${m.id}')">${esc(m.content)}</div>
      <textarea class="card-edit-area" id="edit-${m.id}"
                onkeydown="editKeydown(event,'${m.id}')">${esc(m.content)}</textarea>
      <div class="card-footer">
        <span class="card-age">${age}</span>
        <button class="icon-btn pin-btn ${pin}" onclick="togglePin('${m.id}',${m.pinned})"
                title="${m.pinned ? 'Unpin' : 'Pin'} memory">
          <svg viewBox="0 0 24 24" ${starFill} stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </button>
        <button class="icon-btn edit-btn" onclick="startEdit('${m.id}')" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="icon-btn save-btn" onclick="saveEdit('${m.id}')" title="Save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
        <button class="icon-btn del-btn" onclick="del('${m.id}')" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────────────
   Add memory
───────────────────────────────────────────────────────── */
function toggleAddCard() {
  const card = document.getElementById('add-card');
  const isOpen = card.classList.contains('open');
  if (isOpen) { closeAddCard(); } else { openAddCard(); }
}

function openAddCard() {
  const card = document.getElementById('add-card');
  card.classList.add('open');
  setTimeout(() => document.getElementById('add-textarea').focus(), 60);
}

function closeAddCard() {
  document.getElementById('add-card').classList.remove('open');
  document.getElementById('add-textarea').value = '';
}

function addKeydown(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); submitAdd(); }
  if (e.key === 'Escape') closeAddCard();
}

async function submitAdd() {
  const content = document.getElementById('add-textarea').value.trim();
  if (!content) return;
  try {
    await fetch('/api/memory', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    closeAddCard();
    await load();
  } catch (e) { console.error(e); }
}

/* ─────────────────────────────────────────────────────────
   Inline edit
───────────────────────────────────────────────────────── */
function startEdit(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.classList.add('editing');
  const ta = document.getElementById(`edit-${id}`);
  ta.focus();
  ta.selectionStart = ta.selectionEnd = ta.value.length;
}

function editKeydown(e, id) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); saveEdit(id); }
  if (e.key === 'Escape') cancelEdit(id);
}

function cancelEdit(id) {
  const card = document.getElementById(`card-${id}`);
  if (card) card.classList.remove('editing');
  // Restore textarea content from current memory
  const m = memories.find(x => x.id === id);
  if (m) {
    const ta = document.getElementById(`edit-${id}`);
    if (ta) ta.value = m.content;
  }
}

async function saveEdit(id) {
  const ta = document.getElementById(`edit-${id}`);
  const content = ta ? ta.value.trim() : '';
  if (!content) return;
  try {
    await fetch(`/api/memory/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    await load();
  } catch (e) { console.error(e); }
}

/* ─────────────────────────────────────────────────────────
   Pin / Delete
───────────────────────────────────────────────────────── */
async function togglePin(id, currentPinned) {
  try {
    await fetch(`/api/memory/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pinned: !currentPinned }),
    });
    await load();
  } catch (e) { console.error(e); }
}

async function del(id) {
  const m = memories.find(x => x.id === id);
  const preview = m ? `"${m.content.slice(0, 60)}${m.content.length > 60 ? '…' : ''}"` : 'this memory';
  if (!confirm(`Delete ${preview}?`)) return;
  try {
    await fetch(`/api/memory/${id}`, { method: 'DELETE' });
    await load();
  } catch (e) { console.error(e); }
}

/* ─────────────────────────────────────────────────────────
   Filter
───────────────────────────────────────────────────────── */
function togglePinFilter() {
  pinOnly = !pinOnly;
  document.getElementById('pin-filter').classList.toggle('active', pinOnly);
  renderAll();
}

/* ─────────────────────────────────────────────────────────
   Utilities
───────────────────────────────────────────────────────── */
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatAge(ts) {
  const diff = Math.floor(Date.now() / 1000 - ts);
  if (diff <    60) return `${diff}s ago`;
  if (diff <  3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault(); openAddCard();
  }
  if (e.key === 'Escape') closeAddCard();
});

init();
</script>
</body>
</html>
