# SearXNG configuration for Olama web search integration
# Full reference: https://docs.searxng.org/admin/settings/settings.html

use_default_settings: true

server:
  # Change this to a long random string in production
  secret_key: "change-me-to-a-long-random-string"
  # Disable rate limiter — safe since SearXNG is not exposed to the internet
  limiter: false
  image_proxy: false

search:
  # Safe search: 0=off, 1=moderate, 2=strict
  safe_search: 0
  # JSON format MUST be enabled for Open WebUI to use the search API
  formats:
    - html
    - json

# Engines are inherited from use_default_settings.
# To restrict which engines are used, uncomment and list only the ones you want:
# engines:
#   - name: google
#     disabled: false
#   - name: duckduckgo
#     disabled: false
#   - name: bing
#     disabled: true
